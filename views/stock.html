<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Pro | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #f3f4f6;
            --white: #ffffff;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-dark);
            min-height: 100vh;
        }

        .container {
            max-width: 1150px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--white);
        }
        .back-btn {
    background: linear-gradient(135deg, #1f2937, #374151);
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.back-btn:hover {
    transform: translateY(-2px);
    opacity: 0.9;
}

        .header-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        h3 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #4f46e5, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Modern Form Design */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            background: #f8fafc;
            padding: 25px;
            border-radius: 18px;
            border: 1px solid var(--border);
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-box label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding-left: 4px;
        }

        input {
            padding: 12px 16px;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            background: var(--white);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* Action Buttons */
        .action-area {
            margin-top: 25px;
            display: flex;
            justify-content: flex-end;
        }

        #saveProduct {
            background: linear-gradient(135deg, var(--primary), #4338ca);
            color: white;
            padding: 14px 40px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        #saveProduct:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.5);
            filter: brightness(1.1);
        }

        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border), transparent);
            margin: 40px 0;
        }

        /* Beautiful Table */
        .table-wrapper {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--white);
        }

        .table-container {
            max-height: 450px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f9fafb;
            padding: 16px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #f3f4f6;
            font-size: 14px;
            font-weight: 500;
        }

        tr:hover {
            background-color: #fcfdfe;
        }

        .price-tag {
            color: var(--primary);
            font-weight: 700;
        }

        .stock-badge {
            background: #ecfdf5;
            color: #065f46;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #999; }

    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
    <h3>📦 Inventory Management</h3>

    <button class="back-btn" onclick="goDashboard()">← Dashboard</button>
</div>
    <div class="form-grid">
        <div class="input-box">
            <label>Product Name</label>
            <input type="text" id="pName" placeholder="e.g. Wireless Mouse">
        </div>
        <div class="input-box">
            <label>Product Code</label>
            <input type="text" id="pCode" placeholder="SKU-8821">
        </div>
        <div class="input-box">
            <label>Category</label>
            <input type="text" id="pCategory" placeholder="Peripherals">
        </div>
        <div class="input-box">
            <label>Unit</label>
            <input type="text" id="pUnit" placeholder="Pcs / Box">
        </div>
        <div class="input-box">
            <label>Storage Location</label>
            <input type="text" id="pRoom" placeholder="Rack B-4">
        </div>
        <div class="input-box">
            <label>Purchase Price</label>
            <input type="number" id="pPurchase" placeholder="₹ 0.00">
        </div>
        <div class="input-box">
            <label>Selling Price</label>
            <input type="number" id="pSale" placeholder="₹ 0.00">
        </div>
        <div class="input-box">
            <label>Min. Stock Alert</label>
            <input type="number" id="pMinStock" placeholder="Minimum qty">
        </div>
    </div>

    <div class="action-area">
        <button id="saveProduct">✅ Save to Inventory</button>
    </div>

    <hr>

    <div class="header-section">
        <h3>📋 Live Stock Logs</h3>
    </div>

    <div class="table-wrapper">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Code</th>
                        <th>Category</th>
                        <th>Unit</th>
                        <th>Purchase</th>
                        <th>Sale</th>
                        <th>Stock</th>
                        <th>Min</th>
                        <th>Location</th>
                    </tr>
                </thead>
                <tbody id="productList">
                    <tr>
                        <td colspan="9" style="text-align:center; padding: 50px; color: var(--text-light);">
                            <div style="font-size: 40px; margin-bottom: 10px;">📦</div>
                            No products found. Start by adding one above!
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script>
function goDashboard() {
    window.location.href = "dashboard.html";
}
</script>
<script type="module" src="../js/controllers/stockController.js"></script>

</body>
</html>
